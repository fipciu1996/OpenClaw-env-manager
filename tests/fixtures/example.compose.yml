services:
  openclaw-gateway:
    image: "${OPENCLAW_IMAGE:-openclawenv/ops-agent:1.2.3}"
    build:
      context: "."
      dockerfile: "Dockerfile"
      args:
        OPENCLAW_INSTALL_BROWSER: "${OPENCLAW_INSTALL_BROWSER:-}"
        OPENCLAW_INSTALL_DOCKER_CLI: "${OPENCLAW_INSTALL_DOCKER_CLI:-}"
    container_name: "operations-agent-openclaw-gateway"
    user: "root"
    env_file:
      - ".operations-agent.env"
    environment:
      OPENCLAWENV_PROJECT: "ops-agent"
      PYTHONUNBUFFERED: "1"
      HOME: "/root"
      NPM_CONFIG_CACHE: "/tmp/.npm"
      XDG_CACHE_HOME: "/tmp/.cache"
      TERM: "xterm-256color"
      OPENCLAW_CONFIG_PATH: "/opt/openclaw/openclaw.json"
      OPENCLAW_STATE_DIR: "/opt/openclaw"
      TZ: "${OPENCLAW_TZ:-UTC}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - "${OPENCLAW_TMPFS:-/tmp:rw,noexec,nosuid,nodev,size=64m}"
    pids_limit: "${OPENCLAW_PIDS_LIMIT:-256}"
    ulimits:
      nofile:
        soft: "${OPENCLAW_NOFILE_SOFT:-1024}"
        hard: "${OPENCLAW_NOFILE_HARD:-2048}"
      nproc: "${OPENCLAW_NPROC:-512}"
    volumes:
      - "${OPENCLAW_CONFIG_DIR:-./.openclaw}:/opt/openclaw"
      - "${OPENCLAW_WORKSPACE_DIR:-./workspace}:/opt/openclaw/workspace"
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## WARNING: mounting /var/run/docker.sock grants host root-equivalent access.
      ## Set DOCKER_GID to the host docker group GID before enabling it.
      # - "/var/run/docker.sock:/var/run/docker.sock"
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_HOST_BIND:-127.0.0.1}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_HOST_BIND:-127.0.0.1}:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "set -eu; run_clawhub() { if command -v clawhub >/dev/null 2>&1; then clawhub \"$@\"; else npx --yes clawhub@latest \"$@\"; fi; }; mkdir -p '/opt/openclaw/workspace/skills'; if [ ! -f '/opt/openclaw/workspace/skills/deus-context-engine/SKILL.md' ] || grep -qF 'This skill is referenced from an external catalog.' '/opt/openclaw/workspace/skills/deus-context-engine/SKILL.md'; then rm -rf '/opt/openclaw/workspace/skills/deus-context-engine' && run_clawhub install 'deus-context-engine' --workdir '/opt/openclaw/workspace' --force --no-input; fi; if [ ! -f '/opt/openclaw/workspace/skills/self-improving-agent/SKILL.md' ] || grep -qF 'This skill is referenced from an external catalog.' '/opt/openclaw/workspace/skills/self-improving-agent/SKILL.md'; then rm -rf '/opt/openclaw/workspace/skills/self-improving-agent' && run_clawhub install 'self-improving-agent' --workdir '/opt/openclaw/workspace' --force --no-input; fi; if [ ! -f '/opt/openclaw/workspace/skills/skill-security-review/SKILL.md' ] || grep -qF 'This skill is referenced from an external catalog.' '/opt/openclaw/workspace/skills/skill-security-review/SKILL.md'; then rm -rf '/opt/openclaw/workspace/skills/skill-security-review' && run_clawhub install 'skill-security-review' --workdir '/opt/openclaw/workspace' --force --no-input; fi; if [ ! -f '/opt/openclaw/workspace/skills/free-ride/SKILL.md' ] || grep -qF 'This skill is referenced from an external catalog.' '/opt/openclaw/workspace/skills/free-ride/SKILL.md'; then rm -rf '/opt/openclaw/workspace/skills/free-ride' '/opt/openclaw/workspace/skills/freeride' && run_clawhub install 'freeride' --workdir '/opt/openclaw/workspace' --force --no-input && if [ -d '/opt/openclaw/workspace/skills/freeride' ]; then mv '/opt/openclaw/workspace/skills/freeride' '/opt/openclaw/workspace/skills/free-ride'; fi; fi; if [ ! -f '/opt/openclaw/workspace/skills/agent-browser-clawdbot/SKILL.md' ] || grep -qF 'This skill is referenced from an external catalog.' '/opt/openclaw/workspace/skills/agent-browser-clawdbot/SKILL.md'; then rm -rf '/opt/openclaw/workspace/skills/agent-browser-clawdbot' && run_clawhub install 'agent-browser-clawdbot' --workdir '/opt/openclaw/workspace' --force --no-input; fi; exec node dist/index.js gateway --bind \"${OPENCLAW_GATEWAY_BIND:-lan}\" --port 18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: "${OPENCLAW_IMAGE:-openclawenv/ops-agent:1.2.3}"
    container_name: "operations-agent-openclaw-cli"
    user: "root"
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - "${OPENCLAW_TMPFS:-/tmp:rw,noexec,nosuid,nodev,size=64m}"
    pids_limit: "${OPENCLAW_PIDS_LIMIT:-256}"
    ulimits:
      nofile:
        soft: "${OPENCLAW_NOFILE_SOFT:-1024}"
        hard: "${OPENCLAW_NOFILE_HARD:-2048}"
      nproc: "${OPENCLAW_NPROC:-512}"
    env_file:
      - ".operations-agent.env"
    environment:
      OPENCLAWENV_PROJECT: "ops-agent"
      PYTHONUNBUFFERED: "1"
      HOME: "/root"
      NPM_CONFIG_CACHE: "/tmp/.npm"
      XDG_CACHE_HOME: "/tmp/.cache"
      TERM: "xterm-256color"
      OPENCLAW_CONFIG_PATH: "/opt/openclaw/openclaw.json"
      OPENCLAW_STATE_DIR: "/opt/openclaw"
      TZ: "${OPENCLAW_TZ:-UTC}"
      BROWSER: "echo"
    volumes:
      - "${OPENCLAW_CONFIG_DIR:-./.openclaw}:/opt/openclaw"
      - "${OPENCLAW_WORKSPACE_DIR:-./workspace}:/opt/openclaw/workspace"
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["tail", "-f", "/dev/null"]
    depends_on:
      - openclaw-gateway
