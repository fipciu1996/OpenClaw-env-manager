name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version:
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run test suite
        run: python -m unittest discover -s tests -t . -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project, coverage, and docs tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs]

      - name: Run tests with coverage
        run: |
          python -m coverage run -m unittest discover -s tests -t . -v
          python -m coverage report -m
          python -m coverage xml -o coverage.xml
          python -m coverage json -o coverage.json
          python -m coverage html

      - name: Validate documentation build
        run: python -m mkdocs build --strict -d site-docs

      - name: Build coverage site
        run: |
          python .github/scripts/build_coverage_site.py
          cat .coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4.3.1
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage.json
            htmlcov/
            site/
            site-docs/
            site/coverage.svg
          retention-days: 7
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: site

  deploy-coverage:
    name: Deploy coverage site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4.0.5
